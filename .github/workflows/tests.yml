# https://docs.github.com/en/actions
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # Step 1. Set up operating system
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: windows-latest
            python-version: "3.14"
    steps:
      # Step 2. Check-out repository so we can access its contents
      - uses: actions/checkout@v7.0.0

      # Step 3. Set up Python
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      # step 4. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flake8 pytest pytest-cov
          pip install -r requirements/test.txt

      # Step 5. Install package
      - name: Install package
        run: |
          pip install -e .

      # Step 6. Lint the files with flake8
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      # Step 7. Run the tests
      - name: Test with pytest
        run: |
          pytest tests/ --cov=pynamer --cov-report xml:coverage.xml

      # Step 8. Upload coverage to Codecov
      - uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_build_if_error: true
