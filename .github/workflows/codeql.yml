# CodeQL code scanning workflow for pynamer
# Place this file at: .github/workflows/codeql.yml
#
# This is an "Advanced setup" CodeQL config (you own this file).
# If "Default setup" is currently enabled for this repo under
# Settings -> Code security -> Code scanning, disable it first,
# or GitHub will flag a conflict when this file is detected.

name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Mondays at 01:15 UTC - same slot GitHub's auto-generated configs use
    - cron: '15 1 * * 1'

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload results
      packages: read           # required to fetch internal/private CodeQL packs
      actions: read            # only needed for private repos
      contents: read           # only needed for private repos

    strategy:
      fail-fast: false
      matrix:
        language: [ python ]

    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # queries: security-extended   # uncomment for a broader, slower query suite

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
